name: 🚀 Deploy Bot to VibeHost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-bot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VibeHost
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Trigger VibeHost Deploy Webhook
        run: |
          echo "📡 Sending deploy request to VibeHost..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "http://hcm3.vibehost.vn:20022/api/public/deploy" \
            -H "x-bot-api-key: ${{ secrets.BOT_API_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 30)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Deploy triggered successfully!"
          else
            echo "❌ Deploy failed with status $HTTP_CODE"
            exit 1
          fi

      - name: ⏳ Wait for bot to restart (25s)
        run: sleep 25

      - name: 📋 Register Slash Commands
        continue-on-error: true
        run: |
          echo "📋 Registering slash commands via bot API..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "http://hcm3.vibehost.vn:20022/api/bot/deploy-commands" \
            -H "x-bot-api-key: ${{ secrets.BOT_API_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 60 || echo "curl_failed\n000")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Slash commands registered!"
          else
            echo "⚠️ Could not register commands via API (code: $HTTP_CODE) — bot may still be starting"
          fi

      - name: 🔍 Health Check
        run: |
          echo "Checking bot health..."
          HEALTH=$(curl -s --max-time 10 "http://hcm3.vibehost.vn:20022/api/bot/health" || echo "{}")
          echo "Health response: $HEALTH"
          if echo "$HEALTH" | grep -q '"ok":true'; then
            echo "✅ Bot is healthy and running!"
          else
            echo "⚠️ Bot still starting up — check VibeHost logs if needed"
          fi
