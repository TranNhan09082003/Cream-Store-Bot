name: 🚀 Deploy Bot to VibeHost

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-bot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VibeHost
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 Install dependencies
        run: npm install --omit=dev --prefer-offline

      - name: 📋 Register Slash Commands
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          GUILD_ID: ${{ secrets.GUILD_ID }}
        run: node src/deploy-commands.js && echo "✅ Slash commands registered!" || echo "⚠️ Deploy commands failed"

      - name: 🚀 Trigger VibeHost Deploy Webhook
        run: |
          echo "📡 Sending deploy request to VibeHost..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "http://hcm3.vibehost.vn:20022/api/public/deploy" \
            -H "x-bot-api-key: ${{ secrets.BOT_API_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 30)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Deploy triggered successfully!"
          else
            echo "❌ Deploy failed with status $HTTP_CODE"
            exit 1
          fi

      - name: ⏳ Wait for bot to restart (25s)
        run: sleep 25

      - name: 🔍 Health Check
        run: |
          HEALTH=$(curl -s --max-time 10 "http://hcm3.vibehost.vn:20022/api/bot/health" || echo "{}")
          echo "Health: $HEALTH"
          echo "$HEALTH" | grep -q '"ok":true' && echo "✅ Bot healthy!" || echo "⚠️ Still starting"
